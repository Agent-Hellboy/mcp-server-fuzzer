name: Build and Push Docker Image on Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: princekrroshan01/mcp-fuzzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag,prefix=
            type=raw,value=latest,enable=${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail

          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          label_args=()
          while IFS= read -r label; do
            [ -n "$label" ] && label_args+=(--label "$label")
          done <<< "${{ steps.meta.outputs.labels }}"

          for attempt in 1 2 3; do
            if docker buildx build \
              --file ./Dockerfile \
              --platform linux/amd64,linux/arm64 \
              --push \
              "${tag_args[@]}" \
              "${label_args[@]}" \
              .; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 30))
          done

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "MCP Server Fuzzer - safe, configurable fuzzing for MCP servers"
          readme-filepath: ./README.md
